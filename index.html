<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANÁ FM | ALIMENTANDO TU ESPIRITU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-top: #000000;
            --bg-bottom: #1a0033;
            --neon-gold: #ffcc33;
            --neon-glow: #ffae00;
            --neon-shadow: rgba(255, 174, 0, 0.7);
            --glass: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 204, 51, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            color: white; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* --- ANIMACIONES DE ENTRADA --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .reveal {
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 0.9s; }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .main-wrapper {
            flex: 1; display: flex; position: relative; z-index: 10;
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px;
            flex-direction: column; align-items: center; justify-content: center; gap: 40px;
        }

        .visualizer-container {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            width: clamp(260px, 35vh, 420px);
            height: clamp(260px, 35vh, 420px);
        }

        #radialCanvas {
            position: absolute;
            width: 150%; height: 150%; 
            display: none; z-index: 5;
        }

        .cover-art {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 5px solid var(--neon-gold);
            box-shadow: 0 0 30px var(--neon-shadow);
            overflow: hidden;
            z-index: 10;
            background: #111;
            transition: transform 0.1s ease;
        }
        .cover-art img { width: 100%; height: 100%; object-fit: cover; }

        .content-section { 
            display: flex; flex-direction: column; 
            align-items: center; text-align: center; 
        }

        .info h1 { 
            color: #ffffff; 
            font-weight: 900;
            font-size: clamp(2.2rem, 7vw, 5rem); 
            letter-spacing: clamp(4px, 1vw, 10px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            line-height: 1.1;
        }

        .info p {
            opacity: 0.9; font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            letter-spacing: 5px; color: var(--neon-gold); margin: 10px 0 25px 0;
            text-shadow: 0 0 10px rgba(255, 204, 51, 0.4);
        }

        .controls {
            display: flex; gap: 20px; align-items: center;
            background: var(--glass); padding: 12px 30px;
            border-radius: 100px; border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px); margin-bottom: 25px;
        }

        .btn { background: none; border: none; color: var(--neon-gold); cursor: pointer; font-weight: 800; font-size: 0.75rem; }
        
        .btn-play {
            width: 60px; height: 60px; background: var(--neon-gold); color: black;
            border-radius: 50%; font-size: 1.3rem; 
            box-shadow: 0 0 25px var(--neon-shadow);
            display: flex; align-items: center; justify-content: center;
        }

        .social-row { display: flex; gap: 15px; }
        .social-link {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            color: var(--neon-gold); border-radius: 50%; border: 1px solid var(--border-glass);
            text-decoration: none; transition: 0.3s;
        }
        .social-link:hover { background: var(--neon-gold); color: black; transform: translateY(-3px); }

        footer { 
            width: 100%; text-align: center; padding: 25px 20px; 
            font-size: 0.65rem; opacity: 0.6; color: var(--neon-gold); 
            letter-spacing: 2px; z-index: 10;
        }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; gap: 100px; justify-content: center; }
            #radialCanvas { display: block; }
            .content-section { align-items: flex-start; text-align: left; }
            .info h1 { margin-left: -4px; } 
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    
    <div class="main-wrapper">
        <div class="visualizer-container reveal delay-1">
            <canvas id="radialCanvas"></canvas>
            <div class="cover-art" id="artContainer">
                <img src="https://i.ibb.co/LDDxrrkg/MANA-iso.png" alt="MANÁ FM">
            </div>
        </div>

        <div class="content-section">
            <div class="info reveal delay-2">
                <h1>MANÁ FM</h1>
                <p>ALIMENTANDO TU ESPIRITU</p>
            </div>

            <div class="controls reveal delay-2">
                <button class="btn" onclick="v(-0.1)">VOL －</button>
                <button class="btn btn-play" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="btn" onclick="v(0.1)">VOL ＋</button>
            </div>

            <div class="social-row reveal delay-3">
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/manafmcol/" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

    <footer class="reveal delay-3">
        <h1>CABIMAS-VENEZUELA</h1>
        &copy; 2026 AC MEDIA BROADCAST
    </footer>

    <audio id="stream" crossorigin="anonymous" src="https://stream-162.zeno.fm/3rzep03457zuv"></audio>

    <script>
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('playBtn');
        const artContainer = document.getElementById('artContainer');
        const rCanv = document.getElementById('radialCanvas');
        const rCtx = rCanv.getContext('2d');
        const pCanv = document.getElementById('particleCanvas');
        const pCtx = pCanv.getContext('2d');

        let aCtx, analyser, src, data;
        let init = false;
        let particles = [];

        function res() { 
            pCanv.width = window.innerWidth; 
            pCanv.height = window.innerHeight;
            if(window.innerWidth >= 1024) {
                rCanv.width = rCanv.offsetWidth;
                rCanv.height = rCanv.offsetHeight;
            }
        }
        window.onresize = res; res();

        class P {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * pCanv.width;
                // Empieza en la parte superior (coordenada y negativa)
                this.y = Math.random() * pCanv.height; 
                this.s = Math.random() * 2;
                // Velocidad de caída hacia abajo (v positiva)
                this.v = Math.random() * 0.3 + 0.1;
            }
            // Actualiza para caer (coordenada y aumenta)
            update() { 
                this.y += this.v; 
                if(this.y > pCanv.height) {
                    // Reaparece en la parte superior cuando sale por abajo
                    this.y = -10;
                    this.x = Math.random() * pCanv.width;
                }
            }
            dr() { pCtx.fillStyle = "rgba(255,204,51,0.25)"; pCtx.beginPath(); pCtx.arc(this.x,this.y,this.s,0,Math.PI*2); pCtx.fill(); }
        }
        for(let i=0; i<60; i++) particles.push(new P());

        playBtn.onclick = () => {
            if(!init) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                analyser.fftSize = 128; 
                analyser.smoothingTimeConstant = 0.8;
                src = aCtx.createMediaElementSource(audio);
                src.connect(analyser);
                analyser.connect(aCtx.destination);
                data = new Uint8Array(analyser.frequencyBinCount);
                init = true;
                res();
            }
            if(audio.paused) {
                if (aCtx.state === 'suspended') aCtx.resume();
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                artContainer.style.boxShadow = "0 0 30px var(--neon-shadow)";
                artContainer.style.transform = "scale(1)";
            }
        };

        function render() {
            requestAnimationFrame(render);
            pCtx.clearRect(0,0,pCanv.width,pCanv.height);
            particles.forEach(p=>{ p.update(); p.dr(); });

            if(!init || audio.paused) return;

            analyser.getByteFrequencyData(data);
            
            let sum = 0;
            for(let i=0; i<5; i++) sum += data[i];
            let avg = sum / 5;
            let pulse = (avg / 255) * 50; 
            
            artContainer.style.boxShadow = `0 0 ${20 + pulse}px ${pulse > 25 ? 'var(--neon-gold)' : 'var(--neon-shadow)'}`;
            artContainer.style.transform = `scale(${1 + (pulse/600)})`;

            if(window.innerWidth >= 1024) {
                rCtx.clearRect(0,0,rCanv.width,rCanv.height);
                const c = rCanv.width/2;
                const rad = rCanv.width * 0.33;
                for(let i=0; i<80; i++) {
                    const ang = (i * 2 * Math.PI) / 80;
                    const h = (data[i % 40] / 255) * 60;
                    rCtx.strokeStyle = `rgba(255,204,51,${0.2 + data[i%40]/255})`;
                    rCtx.lineWidth = 3;
                    rCtx.beginPath();
                    rCtx.moveTo(c + Math.cos(ang)*rad, c + Math.sin(ang)*rad);
                    rCtx.lineTo(c + Math.cos(ang)*(rad+h), c + Math.sin(ang)*(rad+h));
                    rCtx.stroke();
                }
            }
        }

        render();
        function v(n) { audio.volume = Math.max(0, Math.min(1, audio.volume + n)); }
    </script>
</body>
</html>
