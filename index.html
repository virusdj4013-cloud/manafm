<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANÁ FM | Alimentando tu Espíritu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000000;
            --neon-gold: #ffcc33;
            --neon-glow: #ffae00;
            --neon-shadow: rgba(255, 174, 0, 0.7);
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; min-height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            color: white; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .main-wrapper {
            flex: 1; display: flex; position: relative; z-index: 10;
            width: 100%; max-width: 1400px; margin: 0 auto; padding: 40px 20px;
            flex-direction: column; align-items: center; justify-content: center; gap: 30px;
        }

        /* --- CONTENEDOR VISUALIZADOR --- */
        .visualizer-container {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            width: clamp(280px, 45vh, 550px);
            height: clamp(280px, 45vh, 550px);
        }

        /* Canvas Radial (Solo visible en PC) */
        #radialCanvas {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140%; height: 140%; /* Más grande que la carátula para que sobresalga */
            pointer-events: none;
            display: none; 
        }

        .cover-art {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 6px solid var(--neon-gold);
            box-shadow: 0 0 50px var(--neon-shadow);
            overflow: hidden;
            background: #111;
            z-index: 10;
        }
        .cover-art img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTENIDO --- */
        .content-section {
            flex: 1.2; display: flex; flex-direction: column;
            align-items: center; text-align: center; justify-content: center;
        }

        .info h1 { 
            color: var(--neon-gold); font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 6.5rem); 
            letter-spacing: clamp(5px, 1vw, 12px);
            text-shadow: 0 0 35px var(--neon-shadow);
            line-height: 1.1; margin-bottom: 5px;
            white-space: nowrap;
        }

        .info p {
            opacity: 0.8; font-size: clamp(0.7rem, 1.2vw, 1.1rem);
            letter-spacing: 8px; text-transform: uppercase;
            font-weight: bold; color: var(--neon-gold); margin-bottom: 25px;
        }

        /* Espectro Lineal (Móvil) */
        #linearSpectrum {
            display: flex; gap: 4px; height: 60px; margin-bottom: 30px; align-items: center;
        }
        .bar {
            width: 6px; background: var(--neon-gold); border-radius: 20px;
            box-shadow: 0 0 10px var(--neon-glow); transition: height 0.1s ease;
        }

        /* CONTROLES */
        .controls {
            display: flex; gap: 30px; align-items: center;
            background: var(--glass); padding: 15px 45px;
            border-radius: 100px; border: 1px solid rgba(255, 204, 51, 0.2);
            backdrop-filter: blur(10px); margin-bottom: 30px;
        }

        .btn { background: none; border: none; color: var(--neon-gold); cursor: pointer; transition: 0.3s; font-size: 1rem; font-weight: 900; }
        .btn-play {
            width: 75px; height: 75px; background: var(--neon-gold); color: black;
            border-radius: 50%; font-size: 1.8rem; box-shadow: 0 0 30px var(--neon-shadow);
        }

        .social-row { display: flex; gap: 20px; }
        .social-link {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            color: var(--neon-gold); border-radius: 50%; border: 1px solid rgba(255, 204, 51, 0.2);
            text-decoration: none; transition: 0.3s;
        }

        footer { width: 100%; text-align: center; padding: 25px; font-size: 0.75rem; letter-spacing: 5px; opacity: 0.5; color: var(--neon-gold); }

        /* --- MODO PC --- */
        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; text-align: left; gap: 100px; padding: 0 80px; }
            .content-section { align-items: flex-start; text-align: left; }
            #linearSpectrum { display: none; } /* Ocultar lineal en PC */
            #radialCanvas { display: block; }  /* Mostrar radial en PC */
            .cover-section { flex: 0.8; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    
    <div class="main-wrapper">
        <div class="cover-section">
            <div class="visualizer-container">
                <canvas id="radialCanvas"></canvas>
                <div class="cover-art">
                    <img src="https://i.ibb.co/LDDxrrkg/MANA-iso.png" alt="MANÁ FM">
                </div>
            </div>
        </div>

        <div class="content-section">
            <div class="info">
                <h1>MANÁ FM</h1>
                <p>ALIMENTANDO TU ESPÍRITU</p>
            </div>

            <div id="linearSpectrum"></div>

            <div class="controls">
                <button class="btn" onclick="v(-0.1)">VOL －</button>
                <button class="btn btn-play" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="btn" onclick="v(0.1)">VOL ＋</button>
            </div>

            <div class="social-row">
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="social-link"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 AC MEDIA BROADCAST • </footer>

    <audio id="stream" crossorigin="anonymous" src="https://stream-176.zeno.fm/7ebzmp31rxhvv"></audio>

    <script>
        // --- PARTÍCULAS DE FONDO ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.3 + 0.1;
                this.opacity = Math.random() * 0.5;
            }
            update() { this.y -= this.speed; if (this.y < 0) this.reset(); }
            draw() {
                ctx.fillStyle = `rgba(255, 204, 51, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for(let i=0; i<80; i++) particles.push(new Particle());

        // --- AUDIO Y ESPECTRO ---
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('playBtn');
        const radialCanvas = document.getElementById('radialCanvas');
        const rCtx = radialCanvas.getContext('2d');
        const linearContainer = document.getElementById('linearSpectrum');
        
        let audioCtx, analyser, source, dataArray;
        let isInit = false;

        // Crear barras para móvil
        for (let i = 0; i < 20; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            linearContainer.appendChild(b);
        }
        const linearBars = document.querySelectorAll('.bar');

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isInit = true;
        }

        function render() {
            requestAnimationFrame(render);
            
            // Animación partículas
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });

            if (!isInit || audio.paused) return;
            analyser.getByteFrequencyData(dataArray);

            const isPC = window.innerWidth >= 1024;

            if (isPC) {
                // RENDER RADIAL PARA PC
                radialCanvas.width = radialCanvas.offsetWidth;
                radialCanvas.height = radialCanvas.offsetHeight;
                const centerX = radialCanvas.width / 2;
                const centerY = radialCanvas.height / 2;
                const radius = radialCanvas.width * 0.36; // Cerca del borde de la carátula
                const bars = 100;

                rCtx.clearRect(0, 0, radialCanvas.width, radialCanvas.height);
                
                for (let i = 0; i < bars; i++) {
                    const angle = (i * 2 * Math.PI) / bars;
                    const val = dataArray[i % 60];
                    const barHeight = (val / 255) * 60;

                    const xStart = centerX + Math.cos(angle) * radius;
                    const yStart = centerY + Math.sin(angle) * radius;
                    const xEnd = centerX + Math.cos(angle) * (radius + barHeight);
                    const yEnd = centerY + Math.sin(angle) * (radius + barHeight);

                    rCtx.strokeStyle = `rgba(255, 204, 51, ${0.4 + val/255})`;
                    rCtx.lineWidth = 3;
                    rCtx.lineCap = 'round';
                    rCtx.shadowBlur = 10;
                    rCtx.shadowColor = '#ffae00';
                    rCtx.beginPath();
                    rCtx.moveTo(xStart, yStart);
                    rCtx.lineTo(xEnd, yEnd);
                    rCtx.stroke();
                }
            } else {
                // RENDER LINEAL PARA MÓVIL
                linearBars.forEach((bar, i) => {
                    const val = dataArray[i * 4];
                    bar.style.height = (val / 255) * 60 + 'px';
                });
            }
        }

        playBtn.onclick = () => {
            if (!isInit) initAudio();
            if (audio.paused) {
                audioCtx.resume(); audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        };

        render();
        function v(n) { audio.volume = Math.max(0, Math.min(1, audio.volume + n)); }
    </script>
</body>
</html>
