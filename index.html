<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANÁ FM | ALIMENTANDO TU ESPIRITU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000000;
            --neon-gold: #ffcc33;
            --neon-glow: #ffae00;
            --neon-shadow: rgba(255, 174, 0, 0.7);
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; min-height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            color: white; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .main-wrapper {
            flex: 1; display: flex; position: relative; z-index: 10;
            width: 100%; max-width: 1400px; margin: 0 auto; padding: 40px 20px;
            flex-direction: column; align-items: center; justify-content: center; gap: 30px;
        }

        /* --- CONTENEDOR VISUALIZADOR --- */
        .visualizer-container {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            width: clamp(280px, 45vh, 500px);
            height: clamp(280px, 45vh, 500px);
        }

        #radialCanvas {
            position: absolute;
            width: 160%; height: 160%; 
            display: none; /* Se activa en PC vía JS */
            z-index: 5;
        }

        .cover-art {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 6px solid var(--neon-gold);
            box-shadow: 0 0 50px var(--neon-shadow);
            overflow: hidden;
            z-index: 10;
            background: #111;
        }
        .cover-art img { width: 100%; height: 100%; object-fit: cover; }

        /* --- INFO --- */
        .info h1 { 
            color: var(--neon-gold); font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 6.5rem); 
            letter-spacing: clamp(5px, 1.2vw, 15px);
            text-shadow: 0 0 35px var(--neon-shadow);
            white-space: nowrap;
            text-transform: uppercase;
        }

        .info p {
            opacity: 0.8; font-size: clamp(0.7rem, 1.2vw, 1.1rem);
            letter-spacing: 8px; color: var(--neon-gold); margin-bottom: 25px;
        }

        /* CONTROLES */
        .controls {
            display: flex; gap: 30px; align-items: center;
            background: var(--glass); padding: 15px 45px;
            border-radius: 100px; border: 1px solid rgba(255, 204, 51, 0.2);
            backdrop-filter: blur(10px); margin-bottom: 30px;
        }

        .btn { background: none; border: none; color: var(--neon-gold); cursor: pointer; font-weight: 900; }
        .btn-play {
            width: 70px; height: 70px; background: var(--neon-gold); color: black;
            border-radius: 50%; font-size: 1.5rem; box-shadow: 0 0 30px var(--neon-shadow);
        }

        .social-row { display: flex; gap: 20px; }
        .social-link {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            color: var(--neon-gold); border-radius: 50%; border: 1px solid rgba(255, 204, 51, 0.2);
            text-decoration: none; transition: 0.3s;
        }

        footer { width: 100%; text-align: center; padding: 20px; font-size: 0.7rem; opacity: 0.5; color: var(--neon-gold); letter-spacing: 2px; }

        /* MODO PC */
        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; gap: 100px; }
            #radialCanvas { display: block; }
            .content-section { align-items: flex-start; text-align: left; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    
    <div class="main-wrapper">
        <div class="visualizer-container">
            <canvas id="radialCanvas"></canvas>
            <div class="cover-art">
                <img src="https://i.ibb.co/LDDxrrkg/MANA-iso.png" alt="MANÁ FM">
            </div>
        </div>

        <div class="content-section">
            <div class="info">
                <h1>MANÁ FM</h1>
                <p>ALIMENTANDO TU VIDA</p>
            </div>

            <div class="controls">
                <button class="btn" onclick="v(-0.1)">VOL －</button>
                <button class="btn btn-play" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="btn" onclick="v(0.1)">VOL ＋</button>
            </div>

            <div class="social-row">
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 AC MEDIA BROADCAST • </footer>

    <audio id="stream" crossorigin="anonymous" src="https://stream-176.zeno.fm/7ebzmp31rxhvv"></audio>

    <script>
        // --- Partículas ---
        const pCanv = document.getElementById('particleCanvas');
        const pCtx = pCanv.getContext('2d');
        let particles = [];
        function res() { pCanv.width = window.innerWidth; pCanv.height = window.innerHeight; }
        window.onresize = res; res();

        class P {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * pCanv.width;
                this.y = Math.random() * pCanv.height;
                this.s = Math.random() * 2;
                this.v = Math.random() * 0.3 + 0.1;
            }
            up() { this.y -= this.v; if(this.y<0) this.reset(); }
            dr() { pCtx.fillStyle = "rgba(255,204,51,0.3)"; pCtx.beginPath(); pCtx.arc(this.x,this.y,this.s,0,Math.PI*2); pCtx.fill(); }
        }
        for(let i=0; i<60; i++) particles.push(new P());

        // --- Audio y Visualizador Radial ---
        const audio = document.getElementById('stream');
        const playBtn = document.getElementById('playBtn');
        const rCanv = document.getElementById('radialCanvas');
        const rCtx = rCanv.getContext('2d');
        let aCtx, analyser, src, data;
        let init = false;

        function render() {
            requestAnimationFrame(render);
            pCtx.clearRect(0,0,pCanv.width,pCanv.height);
            particles.forEach(p=>{ p.up(); p.dr(); });

            if(!init || audio.paused || window.innerWidth < 1024) return;

            rCanv.width = rCanv.offsetWidth;
            rCanv.height = rCanv.offsetHeight;
            analyser.getByteFrequencyData(data);
            
            const c = rCanv.width/2;
            const rad = rCanv.width * 0.32;
            rCtx.clearRect(0,0,rCanv.width,rCanv.height);

            for(let i=0; i<100; i++) {
                const ang = (i * 2 * Math.PI) / 100;
                const h = (data[i%60]/255) * 70;
                rCtx.strokeStyle = `rgba(255,204,51,${0.3 + data[i%60]/255})`;
                rCtx.lineWidth = 3;
                rCtx.lineCap = "round";
                rCtx.beginPath();
                rCtx.moveTo(c + Math.cos(ang)*rad, c + Math.sin(ang)*rad);
                rCtx.lineTo(c + Math.cos(ang)*(rad+h), c + Math.sin(ang)*(rad+h));
                rCtx.stroke();
            }
        }

        playBtn.onclick = () => {
            if(!init) {
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = aCtx.createAnalyser();
                src = aCtx.createMediaElementSource(audio);
                src.connect(analyser);
                analyser.connect(aCtx.destination);
                data = new Uint8Array(analyser.frequencyBinCount);
                init = true;
            }
            if(audio.paused) {
                aCtx.resume(); audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        };

        render();
        function v(n) { audio.volume = Math.max(0, Math.min(1, audio.volume + n)); }
    </script>
</body>
</html>
